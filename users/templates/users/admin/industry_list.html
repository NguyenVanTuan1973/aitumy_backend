{% extends "admin_portal/base.html" %}
{% block content %}
<h2>Danh sách Ngành nghề</h2>

<a href="{% url 'users_admin:industry_add' %}">+ Thêm mới</a>

<table class="table">
    <tr>
        <th>Mã</th>
        <th>Tên</th>
        <th>% Thuế GTGT</th>
        <th>% Thuế TNCN</th>
        <th>Hành động</th>
    </tr>
    {% for i in industries %}
    <tr>
        <td>{{ i.code }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.vat_percent }}</td>
        <td>{{ i.pit_percent }}</td>
        <td>
            <a href="{% url 'users_admin:industry_edit' i.id %}">Sửa</a> |
            <a href="{% url 'users_admin:industry_delete' i.id %}">Xóa</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
