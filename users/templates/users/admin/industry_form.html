{% extends "admin_portal/base.html" %}
{% block content %}

<div class="container mt-4">

    <h2>
        {% if industry %}
            Chỉnh sửa ngành nghề
        {% else %}
            Thêm ngành nghề
        {% endif %}
    </h2>

    <form method="post" class="mt-3">
        {% csrf_token %}

        <div class="card p-4 shadow-sm">

            <!-- Mã ngành -->
            <div class="mb-3">
                <label class="form-label">Mã ngành</label>
                <input type="text"
                       name="code"
                       class="form-control"
                       required
                       value="{% if industry %}{{ industry.code }}{% endif %}">
            </div>

            <!-- Tên ngành -->
            <div class="mb-3">
                <label class="form-label">Tên ngành</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       required
                       value="{% if industry %}{{ industry.name }}{% endif %}">
            </div>

            <!-- Thuế GTGT -->
            <div class="mb-3">
                <label class="form-label">Thuế GTGT (%)</label>
                <input type="number"
                       name="vat_percent"
                       step="0.01"
                       class="form-control"
                       value="{% if industry %}{{ industry.vat_percent }}{% else %}0{% endif %}">
            </div>

            <!-- Thuế TNCN -->
            <div class="mb-3">
                <label class="form-label">Thuế TNCN (%)</label>
                <input type="number"
                       name="pit_percent"
                       step="0.01"
                       class="form-control"
                       value="{% if industry %}{{ industry.pit_percent }}{% else %}0{% endif %}">
            </div>

            <!-- Kích hoạt -->
            <div class="form-check mb-3">
                <input type="checkbox"
                       name="is_active"
                       class="form-check-input"
                       {% if industry %}
                           {% if industry.is_active %}checked{% endif %}
                       {% else %}
                           checked
                       {% endif %}>
                <label class="form-check-label">
                    Kích hoạt ngành nghề
                </label>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{% url 'users_admin:industry_list' %}"
                   class="btn btn-secondary">
                    ← Quay lại
                </a>

                <button type="submit" class="btn btn-primary">
                    💾 Lưu
                </button>
            </div>

        </div>
    </form>

</div>

{% endblock %}
