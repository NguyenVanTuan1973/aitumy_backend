{% extends "admin_portal/base.html" %}

{% block content %}

<div class="card shadow-sm border-0 rounded-4 p-4" style="max-width: 800px;">

    <div class="mb-4">
        <h3 class="fw-bold">⚖️ Upload Văn bản pháp lý</h3>
        <p class="text-muted mb-0">
            Tải lên văn bản mới và cấu hình hiệu lực.
        </p>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">

            {% for field in form %}
            <div class="col-md-6">
                <label class="form-label fw-semibold">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
            {% endfor %}

        </div>

        <div class="mt-4 d-flex justify-content-between">
            <a href="{% url 'admin_portal:admin_legal_list' %}"
               class="btn btn-outline-secondary">
                ← Quay lại
            </a>

            <button type="submit" class="btn btn-primary px-4">
                🚀 Upload
            </button>
        </div>
    </form>

</div>

{% endblock %}
