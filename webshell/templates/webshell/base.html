<!DOCTYPE html>

{% load static %}

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ttumy - Số hóa kế toán{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .logo-wrapper {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: white;

        display: flex;
        align-items: center;
        justify-content: center;

        box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        transform: translateY(-3px);

        overflow: hidden;
        }

        .logo-wrapper img {
            width: 120%;   /* phóng to để “ăn” vào phần trắng */
            height: 120%;
            object-fit: cover;
            border-radius: 50%;
        }

        body {
            font-family: "Segoe UI", sans-serif;
        }

        .navbar {
            background: #0d6efd;
        }

        .navbar a {
            color: white !important;
        }

        .hero {
            background: linear-gradient(120deg, #0d6efd, #6610f2);
            color: white;
            padding: 80px 0;
        }

        .section {
            padding: 60px 0;
        }

        .footer {
            background: #212529;
            color: white;
            padding: 40px 0;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 18px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .demo-grid img {
            width: 100%;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .demo-grid img:hover {
            transform: translateY(-5px);
        }

        /* ================= VIDEO CARD ================= */
        .video-card {
            width: 100%;
            max-width: 100%;
            overflow: hidden;
        }

        /* THUMBNAIL */
        .video-thumb {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 10px;
        }

        /* QUAN TRỌNG: img phải responsive */
        .video-thumb img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* NÚT PLAY */
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 50%;
        }

        /* INFO */
        .video-info {
            width: 100%;
        }

        /* TITLE tránh tràn */
        .video-info h6 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* DESCRIPTION (của bạn giữ lại, thêm fix) */
        .video-desc {
            font-size: 14px;
            color: #555;
            margin-top: 5px;

            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;

            overflow: hidden;
            word-break: break-word; /* thêm cái này */
        }

        /* FIX CỘT BOOTSTRAP */
        .col-lg-4, .col-md-6, .col-md-12 {
            overflow: hidden;
        }

        .faq-item {
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .faq-question {
            padding: 10px;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .faq-answer {
            display: none;
            padding: 10px;
            background: #fff;
        }

        .faq-item.active .faq-answer {
            display: block;
        }

        .icon {
            font-weight: bold;
        }

        .legal-box {
            margin-top: 10px;
            font-size: 13px;
            color: #555;
        }

        .legal-item {
            margin-left: 15px;
        }

        /* highlight */
        mark {
            background: yellow;
            padding: 0 2px;
        }

        /* ================= ABOUT CARD ================= */
        .about-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .about-card {
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .about-card:hover {
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        /* TITLE */
        .about-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        /* CONTENT */
        .about-content {
            font-size: 14px;
            color: #555;
            position: relative;
        }

        /* COLLAPSED STATE */
        .about-content.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 4;   /* 👈 số dòng preview */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* FIX HTML từ DB */
        .about-content * {
            max-width: 100%;
            word-break: break-word;
        }

        /* BUTTON */
        .about-toggle {
            margin-top: 6px;
            padding: 0;
            border: none;
            background: none;
            color: #0d6efd;
            font-size: 13px;
            cursor: pointer;
        }

        .about-toggle:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <div class="logo-wrapper">
                <img src="{% static 'images/logo_ttumy.png' %}" alt="Ttumy">
            </div>
        </a>

        <!-- Button mobile -->
        <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:products' %}">Sản phẩm</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:legal_center' %}">Trung tâm pháp lý</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:guide_center' %}">Hướng dẫn</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:policy' %}">Chính sách</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:login' %}">Đăng nhập</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer class="footer text-center">
    <div class="container">
        <p>© 2026 TTUMY - Ứng dụng hỗ trợ kế toán</p>
        <p>Email: contact@ttumy.vn | Hotline: 0909 331 388</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
function toggleFaq(el) {
    const item = el.parentElement;
    item.classList.toggle("active");
}

// SEARCH REALTIME
const searchInput = document.getElementById("faqSearch");

if (searchInput) {
    searchInput.addEventListener("input", function () {
        let value = this.value.toLowerCase();
        let items = document.querySelectorAll(".faq-item");

        items.forEach(function(item) {
            let text = item.getAttribute("data-text");

            if (text && text.includes(value)) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    });
}

function highlightText(element, keyword) {
    if (!keyword) return;

    let regex = new RegExp(`(${keyword})`, "gi");
    element.innerHTML = element.innerHTML.replace(regex, "<mark>$1</mark>");
}
</script>
