<!DOCTYPE html>

{% load static %}

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ttumy - Số hóa kế toán{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .logo-wrapper {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: white;

        display: flex;
        align-items: center;
        justify-content: center;

        box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        transform: translateY(-3px);

        overflow: hidden; /* 🔥 QUAN TRỌNG */
        }

        .logo-wrapper img {
            width: 120%;   /* phóng to để “ăn” vào phần trắng */
            height: 120%;
            object-fit: cover;
            border-radius: 50%;
        }

        body {
            font-family: "Segoe UI", sans-serif;
        }

        .navbar {
            background: #0d6efd;
        }

        .navbar a {
            color: white !important;
        }

        .hero {
            background: linear-gradient(120deg, #0d6efd, #6610f2);
            color: white;
            padding: 80px 0;
        }

        .section {
            padding: 60px 0;
        }

        .footer {
            background: #212529;
            color: white;
            padding: 40px 0;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 18px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .demo-grid img {
            width: 100%;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .demo-grid img:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <div class="logo-wrapper">
                <img src="{% static 'images/logo_ttumy.png' %}" alt="Ttumy">
            </div>
        </a>

        <!-- Button mobile -->
        <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:products' %}">Sản phẩm</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:legal_center' %}">Trung tâm pháp lý</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:guide_center' %}">Hướng dẫn</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:policy' %}">Chính sách</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-bold fs-5" href="{% url 'webshell:login' %}">Đăng nhập</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer class="footer text-center">
    <div class="container">
        <p>© 2026 TTUMY - Ứng dụng hỗ trợ kế toán</p>
        <p>Email: support@ttumy.vn | Hotline: 0909 331 388</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
