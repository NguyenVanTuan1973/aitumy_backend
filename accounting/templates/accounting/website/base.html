<!DOCTYPE html>
<html>
{% load static %}
<head>
    <title>Accounting</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f5f6fa; }

        .sidebar {
            height:100vh;
            background:#0f172a;
            color:white;
        }

        .sidebar a {
            display:block;
            color:#cbd5e1;
            padding:12px;
            text-decoration:none;
        }

        .sidebar a:hover {
            background:#1e293b;
        }

        .header {
            background:white;
            border-bottom:1px solid #ddd;
            padding:10px 20px;
        }

        //===== Nhật ký chung =======
        .journal-scroll-container {
            max-height: 500px;
            overflow-y: auto;
        }

        /* sticky header */
        .sticky-top-custom {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            z-index: 2;
        }

        /* dòng tổng */
        .row-total {
            font-weight: bold;
            background: #f5f5f5;
        }

    </style>

</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar">

            <h5 class="p-3">📊 TTUMY</h5>

            <!-- DASHBOARD -->
            <a href="{% url 'accounting-web:accounting_dashboard' %}">🏠 Dashboard</a>

            <hr>

            <small class="px-3">NHẬP LIỆU</small>
            <a href="{% url 'accounting-web:accounting_upload' %}">📥 Hóa đơn</a>
            <a href="{% url 'accounting-web:opening_balance' %}">📄 Số Đầu kỳ</a>

            <hr>

            <small class="px-3">KẾ TOÁN</small>
            <a href="{% url 'accounting-web:journal_review' %}">📘 Nhật ký</a>
            <a href="{% url 'accounting-web:document_match' %}">📎 Chứng từ</a>

            <hr>

            <small class="px-3">SỔ SÁCH</small>
            <a href="{% url 'accounting-web:register_list' %}">📚 Sổ kế toán</a>

            <hr>

            <!-- LOGOUT -->
            <a href="{% url 'accounting-web:accounting_logout' %}">🚪 Đăng xuất</a>

        </div>

        <!-- MAIN -->
        <div class="col-10 p-0">

            <!-- HEADER -->
            <div class="header d-flex justify-content-between">

                <div>
                    🏢 {{ request.user.organization.name|default:"Doanh nghiệp" }}
                </div>

                <div>
                    {{ request.user.username }}
                </div>

            </div>

            <!-- CONTENT -->
            <div class="p-4">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="{% static 'js/accounting/app.js' %}"></script>

<script src="{% static 'js/accounting/ui/menu.js' %}"></script>

</body>
</html>
